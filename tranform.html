<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
   div {
  width: 300px;
  height: 100px;
  background-color: rgb(90, 186, 130);
  border: 1px solid black;
  margin: 100px;
  display: inline-block;

}

.box1{
  transform: rotate(20deg);
 
}
.box2{
  transform: rotate(-20deg);
}
.box3{
  transform: scale(1,2);
}.box4{
  transform: skew(20deg,20deg);
}
.boxA{
  transform: rotateX(150deg);
}
.boxB{
  transform: rotateY(150deg);
}

.boxC{
  transform: rotateZ(150deg);
}
</style>

<body>
  <h1>2D TRANFORM</h1>
  
  <div class="box1">Rotate (20deg)</div>
  <div class="box2">Rotate(-20deg)</div>
<div class="box3">Scale (1,2)</div>
<div class="box4">skew(20deg,20deg)</div>
<h1>3D TRANFORM</h1>
<div class="boxA">Rotate X</div>
<div class="boxB">Rotate Y</div>
<div class="boxC">Rotate Z</div>
</body>

</html>
