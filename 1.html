        <title>Document</title>
        <style>
            *, *:after, *:before {
  box-sizing: border-box;
}
        body{
  background: #F5F3F4;
  margin: 0;
  padding: 10px;
  text-align: center;
}
h1{
  color: #4c4c4c;
  font-weight: 600;
  border-bottom: 1px solid #ccc;
}

h2, h4{
  font-weight: 400;
  color: #4d4d4d;
}
.card{
    display: inline-block;
    margin: 10px;
    background: #fff;
    padding: 15px;
   
   
    color: #555;}
  
.box{
    width: 100px;
    height: 100px;
    margin: auto;
    background: #ddd;
    cursor: pointer;
    box-shadow: 0 0 5px #ccc inset;
}
    
    
    .fill{
      width: 100px;
      height: 100px;
      position: relative;
      background: #03A9F4;
      opacity: .5;
      
    } 

  
  p{
    margin:25px 0 0;
  }

.rotate::hover{
    transform: rotate(150deg);
    
}

            </style>
    </head>
