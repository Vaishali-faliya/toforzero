<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .linear{
            width: 100%;
            height: 200px;
            background-image:linear-gradient(90deg, red,green);
        }
        .radial{
            width: 100%;
            height: 200px;
            background-image:radial-gradient(circle, red,green);
        }
        .conic{
            width: 30%;
            height: 300px;
            background-image: conic-gradient(red 0%, green 100%);
            border-radius: 50%;
           
            
        }

    </style>
</head>
<body>
    <h1>Gradient linear</h1>
    <div class="linear"></div>
    <h1>Radial Gradient</h1>
    <div class="radial"></div>
    <h1>Conic Gradient </h1>
    <div class="conic"></div>
</body>
</html>
