<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
        div{
            width: 200px;
            height:200px;
        display:inline-block;
            justify-content:space-between;
            align-items: center;
            margin: 50px;
            border: 7px solid black;


        }
        .box1{
        background-color: blue;
        
        border-radius: 50px;
}
.box2{
    background-color: green;
    border-radius: 100%;
}
.box3{
    background-color: yellow;
    border-radius: 10px 20px;
}
.box4{
    background-color: orange;
    border-radius: 10px 100px 10px 100px;
}
.box5{
    background-color: purple;
    border-radius: 100px 100px 100px 10px;
}
.box6{
    background-color: pink;
    border-radius: 10px 200px 10px 200px;
}
.box7{
    background-color: red;
    border-radius: 30px 50px 100px 50px/100px 50px 50px 50px;
 
}
h1{
    text-align: center;
    font-size: 40px;
}

    </style>
    </head>
    <body>
        <h1>Rounded border</h1>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
    </body>
</html>
