<head>

    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;

            width: 300px;

             box-shadow: 0 10px 20px rgb(82, 80, 80);
 transition: transform 1s linear;
 }

    transform: rotatey(180deg);
 }

    <div>
        <div class="card">

    </div>
