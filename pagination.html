<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body {
                margin: 40px;
                padding:40px;
            }
            .icon{
                width: 15px;
                height: 15px;
                background-color: transparent;
               
            }
            .container {
  position: relative;
  height: 100vh;
  width: 100%;
  background-image: 
    url("https://images.pexels.com/photos/247431/pexels-photo-247431.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940");
  background-image:cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}
           .pagination{
    position: relative;
 height: 60px;
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 5px 5px 30px rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
  border-radius: 20px;}
            
            .pagination a {
  color: black;
  padding: 8px 16px;
  text-decoration: none;
  border: 1px solid black;
   transition: background-color .3s;
}
.pagination a:hover {background-color: #ddd;}
        </style>
    </head>
    <body>

        <div class="container">

            <div class="pagination">

                <img src="./1icon.png" alt="icon" class="icon">
                <a href="#" src="./1icon.png">Previous</a>
                <a href="#">1</a>
                <a href="#">2</a>
                <a href="#">3</a>
                <a href="#">4</a>
                <a href="#">5</a>
                <a href="#" class="next">Next</a>
                <img src="./next icon.png" alt="icon" class="icon">
            </div></div>
    </body>
</html>
